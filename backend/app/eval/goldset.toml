# =============================================================================
# Golden set — retrieval ground truth for the eval harness.
#
# Each [[q]] is one question. `gold` is a list of distinctive text snippets;
# every snippet must occur (case-insensitive, whitespace-collapsed) in the
# chunk(s) that correctly answer the question. resolve.py maps each snippet to
# the LIVE chunk_id(s) in Qdrant, so this set survives re-ingestion — it points
# at *meaning*, not at a transient UUID.
#
# `style` is a free-text label for our own analysis, not used by scoring:
#   keyword  – question reuses the chunk's exact terms (should favor sparse)
#   semantic – question is paraphrased, little lexical overlap (should favor dense)
#   mixed    – some shared terms, some paraphrase
#
# Validate after editing:  python -m app.eval.resolve
# =============================================================================

# ---- §1  Python internals --------------------------------------------------

[[q]]
id = "bytecode-pyc"
file = "interviev_short.md"
style = "keyword"
question = "Де і в якій папці зберігається скомпільований байткод Python?"
gold = ["__pycache__"]
note = "Байткод кешується у .pyc файлах у папці __pycache__ для швидшого повторного запуску."

[[q]]
id = "compile-stages"
file = "interviev_short.md"
style = "mixed"
question = "Через які етапи проходить Python-код від вихідника до виконання?"
gold = ["абстрактне синтаксичне дерево"]
note = "Парсинг → AST → компіляція в байткод → інтерпретація PVM."

[[q]]
id = "gil-cpu-threads"
file = "interviev_short.md"
style = "semantic"
question = "Чому додавання потоків не прискорює важкі обчислення на процесорі в Python?"
gold = ["один потік байткоду"]
note = "GIL: у CPython одночасно виконується лише один потік байткоду → немає CPU-паралелізму на потоках."

[[q]]
id = "gil-cpu-workloads"
file = "interviev_short.md"
style = "mixed"
question = "Для яких задач GIL заважає — рендеринг відео, ML, обробка зображень?"
gold = ["відео-рендеринг"]
note = "CPU-важкі задачі, де потоки борються за єдиний GIL."

[[q]]
id = "gil-bypass"
file = "interviev_short.md"
style = "keyword"
question = "Якими способами обходять GIL — multiprocessing, C-розширення, Cython?"
gold = ["pytorch, tensorflow"]
note = "multiprocessing, C-розширення (numpy/pandas/pytorch/tensorflow), Cython, numba, async+I/O."

[[q]]
id = "async-coroutine"
file = "interviev_short.md"
style = "keyword"
question = "Що створює async def і як await впливає на виконання?"
gold = ["створює корутину"]
note = "async def → корутина, що призупиняється/відновлюється; await віддає керування event loop."

[[q]]
id = "event-loop"
file = "interviev_short.md"
style = "semantic"
question = "Що відстежує готові до роботи задачі та перемикається між ними під час очікування?"
gold = ["постійно перевіряє"]
note = "Event Loop: цикл, який перевіряє готові корутини, призупиняє на I/O, будить по готовності."

[[q]]
id = "threading-vs-mp"
file = "interviev_short.md"
style = "mixed"
question = "Коли брати threading, а коли multiprocessing для паралелізму?"
gold = ["кожен процес має власний GIL"]
note = "threading → I/O-bound; multiprocessing → CPU-bound (власний GIL на процес, різні ядра)."

