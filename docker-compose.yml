services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ailearningos
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ailearningos"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/ailearningos
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Embedding model/dimension/prefixes are driven by app/core/config.py so they
      # can never drift apart (a stray EMBEDDING_MODEL env override here would
      # silently shadow config and the collection dimension wouldn't match).
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - uploaded_files:/app/uploads
      # HF model cache on a named volume so it survives container recreation and
      # is shared with one-off `docker compose run` containers (e.g. the eval
      # reingest), which otherwise re-download the embedder every time.
      - hf_cache:/root/.cache/huggingface
      # Dev: mount source for hot-reload (edits apply without rebuild)
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    # No --reload: it reloads the whole process (re-loading torch + the embedder
    # and cross-encoder models) on every file change → memory spike / OOM, and
    # it doesn't even fire reliably on macOS bind-mounts. Apply code edits with
    # `docker compose restart backend` instead.
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  uploaded_files:
  hf_cache:
